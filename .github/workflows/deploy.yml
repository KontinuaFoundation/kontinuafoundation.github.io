name: Deploy to GitHub Pages

run-name: "Deploy · ${{ github.ref_name }} by @${{ github.actor }}"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Sync graph data
        run: bun run sync:graph

      - name: Commit generated graph updates
        if: github.ref == 'refs/heads/main'
        run: |
          if ! git diff --quiet -- public/graph.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/graph.json
            git commit -m "chore: sync graph data"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No graph changes to commit."
          fi

      - name: Build site
        run: bun run build

      - name: Set up GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
